<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marsho</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0e1621;
      --panel: #17212b;
      --line: rgba(255,255,255,0.06);
      --text: #e8f1ff;
      --muted: #93a4b7;
      --primary: #4f8cff;
      --primary-hover: #6a9dff;
      --me: #2b5278;
      --other: #182533;
      --danger: #ef4444;
      --soft: rgba(255,255,255,0.08);
      --menu: #213243;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      background:
        radial-gradient(circle at top left, rgba(79,140,255,0.08), transparent 30%),
        radial-gradient(circle at bottom right, rgba(43,82,120,0.18), transparent 35%),
        var(--bg);
    }

    .app {
      width: 100%;
      height: 100vh;
      display: flex;
      position: relative;
    }

    .sidebar {
      width: 360px;
      min-width: 360px;
      background: rgba(23,33,43,0.95);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: 18px 16px 14px;
      gap: 14px;
      position: relative;
      z-index: 30;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary), #7aa7ff);
      color: white;
      font-weight: bold;
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand-title {
      font-size: 30px;
      font-weight: 800;
    }

    .card {
      background: rgba(31,44,58,0.95);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
    }

    .card-title {
      font-size: 13px;
      color: #c7d2e3;
      margin-bottom: 12px;
    }

    input {
      width: 100%;
      border: 1px solid transparent;
      outline: none;
      background: #0f1a27;
      color: var(--text);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    input::placeholder {
      color: #6f859c;
    }

    input:focus {
      border-color: rgba(79,140,255,0.7);
      box-shadow: 0 0 0 4px rgba(79,140,255,0.12);
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 13px;
      color: white;
    }

    .btn-primary {
      background: linear-gradient(180deg, var(--primary-hover), var(--primary));
      box-shadow: 0 8px 18px rgba(79,140,255,0.28);
    }

    .btn-ghost {
      background: rgba(255,255,255,0.08);
    }

    .btn-danger {
      background: linear-gradient(180deg, #ff6a6a, var(--danger));
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    .section-title {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .dialogs {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    .user-item {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      margin-bottom: 8px;
      border: 1px solid transparent;
      position: relative;
    }

    .user-item.active {
      background: rgba(79,140,255,0.13);
      border-color: rgba(79,140,255,0.45);
    }

    .user-item.pinned {
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .avatar {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
      user-select: none;
    }

    .user-main {
      flex: 1;
      min-width: 0;
    }

    .user-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .user-name {
      font-weight: 700;
    }

    .user-time {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .user-preview {
      font-size: 12px;
      color: #cbd5e1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 4px;
    }

    .user-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .badge {
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: 999px;
      background: var(--primary);
      color: white;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .pin-mark {
      font-size: 11px;
      color: #a9c7ff;
      margin-left: 6px;
    }

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 10;
    }

    .topbar {
      min-height: 74px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(23,33,43,0.95);
      flex-shrink: 0;
    }

    .back-btn {
      display: none;
      flex-shrink: 0;
    }

    .topbar-avatar {
      width: 46px;
      height: 46px;
      min-width: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      flex-shrink: 0;
    }

    #topbar {
      font-size: 18px;
      font-weight: 700;
    }

    #topSub {
      font-size: 12px;
      color: var(--muted);
    }

    .status {
      padding: 10px 18px;
      font-size: 12px;
      color: #93c5fd;
      border-bottom: 1px solid var(--line);
      background: rgba(13,23,36,0.88);
      flex-shrink: 0;
    }

    .typing-bar {
      padding: 8px 18px;
      font-size: 12px;
      color: #8ab4ff;
      min-height: 34px;
      border-bottom: 1px solid var(--line);
      background: rgba(13,23,36,0.65);
      flex-shrink: 0;
    }

    .reply-bar {
      display: none;
      padding: 10px 14px;
      margin: 10px 0 0;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border-left: 3px solid var(--primary);
      font-size: 12px;
      color: #dbe7f7;
    }

    .reply-bar.visible {
      display: block;
    }

    .reply-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .reply-close {
      background: transparent;
      color: #b9c7da;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }

    .message-search-wrap {
      padding: 10px 16px 0;
      background: rgba(23,33,43,0.95);
      flex-shrink: 0;
    }

    .message-search-wrap input {
      margin: 0;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .empty {
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 16px;
      color: #cbd5e1;
    }

    .date-sep {
      align-self: center;
      background: rgba(255,255,255,0.08);
      color: #dce7f8;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      margin: 6px 0;
    }

    .message {
      max-width: 78%;
      align-self: flex-start;
      background: var(--other);
      border-radius: 18px 18px 18px 8px;
      padding: 10px 12px 12px;
      word-break: break-word;
      position: relative;
    }

    .message.mine {
      align-self: flex-end;
      background: var(--me);
      border-radius: 18px 18px 8px 18px;
    }

    .message-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 6px;
    }

    .message-name {
      font-size: 12px;
      color: #b9d5ff;
      font-weight: 700;
    }

    .message-time {
      font-size: 11px;
      color: #c8d6ea;
      white-space: nowrap;
    }

    .message-text {
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .message-image {
      max-width: 260px;
      width: 100%;
      border-radius: 12px;
      display: block;
      margin-top: 6px;
      cursor: pointer;
    }

    .message-audio {
      width: 100%;
      max-width: 280px;
      margin-top: 6px;
    }

    .message-reply {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .message-reply-name {
      font-weight: 700;
      margin-bottom: 4px;
      color: #d9e8ff;
    }

    .message-status {
      margin-top: 8px;
      font-size: 11px;
      color: #c8d6ea;
      opacity: 0.95;
      text-align: right;
    }

    .composer {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--line);
      background: rgba(23,33,43,0.95);
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .composer-top {
      display: flex;
      gap: 10px;
    }

    .composer-top input {
      margin: 0;
      flex: 1;
      border-radius: 18px;
    }

    .composer-bottom {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
    }

    .viewer {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .viewer.visible {
      display: flex;
    }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
    }

    .menu {
      position: fixed;
      z-index: 10000;
      min-width: 170px;
      background: var(--menu);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 6px;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .menu.visible {
      display: block;
    }

    .menu button {
      width: 100%;
      text-align: left;
      border: none;
      background: transparent;
      color: #e6f0ff;
      border-radius: 8px;
      padding: 9px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .menu button:hover {
      background: rgba(255,255,255,0.08);
    }

    @media (max-width: 700px) {
      .sidebar,
      .main {
        position: absolute;
        inset: 0;
        width: 100%;
        min-width: 100%;
        height: 100%;
      }

      .sidebar {
        display: flex;
        z-index: 50;
      }

      .main {
        display: none;
        z-index: 60;
      }

      .app.mobile-chat-open .sidebar {
        display: none;
      }

      .app.mobile-chat-open .main {
        display: flex;
      }

      .back-btn {
        display: inline-block;
      }

      .message {
        max-width: 90%;
      }

      .brand-title {
        font-size: 24px;
      }

      .sidebar {
        width: 100%;
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="sidebar">
      <div class="brand-row">
        <div class="brand-logo">M</div>
        <div>
          <div class="brand-title">Marsho</div>
        </div>
      </div>

      <div class="card" id="auth">
        <div class="card-title">Вход / регистрация</div>
        <input id="phone" type="text" placeholder="Номер телефона" />
        <input id="username" type="text" placeholder="Username" />
        <div class="row">
          <button type="button" class="btn btn-primary" onclick="registerUser()">Войти</button>
          <button type="button" class="btn btn-ghost" onclick="logoutUser()">Выйти</button>
        </div>
      </div>

      <input id="searchInput" type="text" placeholder="Поиск по пользователям..." />

      <div class="section-title">Пользователи</div>
      <div class="dialogs" id="users">
        <div class="empty">Пока никого нет онлайн</div>
      </div>
    </div>

    <div class="main">
      <div class="topbar">
        <button type="button" class="btn btn-ghost back-btn" onclick="goBackToUsers()">Назад</button>
        <div class="topbar-avatar" id="topAvatar">M</div>
        <div>
          <div id="topbar">Выберите пользователя</div>
          <div id="topSub">Откройте диалог слева</div>
        </div>
      </div>

      <div class="status" id="status">Статус: загрузка...</div>
      <div class="typing-bar" id="typingBar"></div>

      <div class="message-search-wrap">
        <input id="messageSearchInput" type="text" placeholder="Поиск по сообщениям..." />
      </div>

      <div class="chat" id="chat">
        <div class="empty">Сначала войдите, затем выберите пользователя слева.</div>
      </div>

      <div class="composer">
        <div class="reply-bar" id="replyBar">
          <div class="reply-top">
            <span id="replyTitle">Reply</span>
            <button class="reply-close" type="button" onclick="clearReply()">Close</button>
          </div>
          <div id="replyText"></div>
        </div>

        <div class="composer-top">
          <input id="msg" placeholder="Введите сообщение..." />
          <button type="button" class="btn btn-primary" onclick="sendMessage()">Отправить</button>
        </div>

        <div class="composer-bottom">
          <button type="button" class="btn btn-ghost" onclick="pickImage()">Фото</button>
          <button type="button" class="btn btn-ghost" id="voiceBtn" onclick="toggleRecording()">Голосовое</button>
          <span class="hint" id="recordHint">Готов к записи</span>
        </div>

        <input type="file" id="imageInput" class="hidden" accept="image/*" />
      </div>
    </div>
  </div>

  <div class="viewer" id="viewer" onclick="closeImageViewer()">
    <img id="viewerImg" alt="preview" />
  </div>

  <div class="menu" id="messageMenu"></div>

  <script src="/app.js"></script>
</body>
</html>
